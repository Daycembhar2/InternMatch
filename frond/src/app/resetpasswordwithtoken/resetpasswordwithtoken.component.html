<!DOCTYPE html>
<html lang="en" dir="ltr" data-mode="light" class="scroll-smooths group" data-theme-color="violet">
    
<!-- Mirrored from themesdesign.in/jobcy-tailwind/layout/reset-password.html by HTTrack Website Copier/3.x [XR&CO'2014], Mon, 09 Feb 2026 08:19:10 GMT -->
<head>
        <meta charset="utf-8" />
        <title>index-1 | Jobcy - Admin & Dashboard Template</title>
        <meta
          name="viewport"
          content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />
        <meta
          content="Tailwind Multipurpose Admin & Dashboard Template"
          name="description"
        />
        <meta content="" name="Themesdesign" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />

       
    </head>
    <body class="bg-white dark:bg-neutral-800">
<div class="main-content">
  <div class="page-content">
    <section class="flex items-center justify-center min-h-screen py-10
                    group-data-[theme-color=violet]:bg-violet-500/10 dark:bg-neutral-700">
      <div class="container mx-auto">
        <div class="grid grid-cols-12">
          <div class="col-span-12 lg:col-span-10 lg:col-start-2">
            <div class="flex flex-col bg-white rounded-lg dark:bg-neutral-800">
              <div class="grid flex-col grid-cols-12">

                <!-- Colonne gauche -->
                <div class="col-span-12 lg:col-span-6 ltr:rounded-l-lg">
                  <div class="p-10">
                    <a href="/">
                      <img src="assets/images/logo-light.png" class="hidden mx-auto dark:block" alt="">
                      <img src="assets/images/logo-dark.png"  class="block mx-auto dark:hidden" alt="">
                    </a>
                    <div class="mt-5">
                      <img src="assets/images/auth/reset-password.png" alt="">
                    </div>
                  </div>
                </div>

                <!-- Colonne droite -->
                <div class="col-span-12 lg:col-span-6 rounded-b-md
                            group-data-[theme-color=violet]:bg-violet-700
                            lg:rounded-b-none lg:ltr:rounded-r-lg">
                  <div class="flex flex-col justify-center h-full p-12">

                    <!-- Token valide -->
                    <div *ngIf="tokenValid; else invalidToken">
                      <div class="text-center mb-6">
                        <h5 class="text-[18.5px] text-white">Nouveau mot de passe</h5>
                        <p class="mt-2 text-white/80">Choisissez un nouveau mot de passe sécurisé.</p>
                      </div>

                      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-5">

                        <!-- Nouveau mot de passe -->
                        <div>
                          <label class="block text-white mb-2">Nouveau mot de passe</label>
                          <input type="password" formControlName="newPassword"
                            class="w-full py-2.5 px-4 rounded
                                   group-data-[theme-color=violet]:bg-violet-400/40
                                   border-transparent placeholder:text-white/50 text-white"
                            placeholder="Minimum 8 caractères">
                          <div *ngIf="newPasswordControl?.touched && newPasswordControl?.errors"
                            class="text-red-300 text-sm mt-1">
                            <div *ngIf="newPasswordControl?.errors?.['required']">Requis</div>
                            <div *ngIf="newPasswordControl?.errors?.['minlength']">
                              Minimum 8 caractères
                            </div>
                          </div>
                        </div>

                        <!-- Confirmer mot de passe -->
                        <div>
                          <label class="block text-white mb-2">Confirmer le mot de passe</label>
                          <input type="password" formControlName="confirmPassword"
                            class="w-full py-2.5 px-4 rounded
                                   group-data-[theme-color=violet]:bg-violet-400/40
                                   border-transparent placeholder:text-white/50 text-white"
                            placeholder="Confirmez votre mot de passe">
                          <div *ngIf="confirmPasswordControl?.touched && resetForm.errors?.['passwordMismatch']"
                            class="text-red-300 text-sm mt-1">
                            Les mots de passe ne correspondent pas
                          </div>
                        </div>

                        <!-- Bouton -->
                        <button type="submit" [disabled]="isLoading || resetForm.invalid"
                          class="w-full py-3 bg-white text-gray-900 font-medium rounded
                                 hover:bg-gray-100 transition disabled:opacity-60">
                          {{ isLoading ? 'Réinitialisation...' : 'Réinitialiser le mot de passe' }}
                        </button>

                      </form>

                      <div class="mt-6 text-center">
                        <a href="/signin" class="text-white/50 hover:text-white text-sm underline">
                          Retour à la connexion
                        </a>
                      </div>
                    </div>

                    <!-- Token invalide -->
                    <ng-template #invalidToken>
                      <div class="text-center py-10">
                        <div class="text-5xl mb-4">⏰</div>
                        <h5 class="text-white text-xl font-semibold mb-3">Lien expiré</h5>
                        <p class="text-white/70 mb-6">
                          Ce lien de réinitialisation est invalide ou a expiré (valable 15 minutes).
                        </p>
                        <a href="/resetpassword"
                          class="px-6 py-2.5 bg-white text-gray-900 rounded-lg
                                 font-medium hover:bg-gray-100 transition text-sm">
                          Demander un nouveau lien
                        </a>
                      </div>
                    </ng-template>

                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
</body>
</html>
