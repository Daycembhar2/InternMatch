<!DOCTYPE html>
<html lang="en" dir="ltr" data-mode="light" class="scroll-smooths group" data-theme-color="violet">
    
<!-- Mirrored from themesdesign.in/jobcy-tailwind/layout/reset-password.html by HTTrack Website Copier/3.x [XR&CO'2014], Mon, 09 Feb 2026 08:19:10 GMT -->
<head>
        <meta charset="utf-8" />
        <title>Changer mot de passe</title>
        <meta
          name="viewport"
          content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />
        <meta
          content="Tailwind Multipurpose Admin & Dashboard Template"
          name="description"
        />
        <meta content="" name="Themesdesign" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    </head>
    
    <body class="bg-white dark:bg-neutral-800">




        <div class="main-content">
            <div class="page-content">

                <section class="flex items-center justify-center min-h-screen py-10 group-data-[theme-color=violet]:bg-violet-500/10 group-data-[theme-color=sky]:bg-sky-500/10 group-data-[theme-color=red]:bg-red-500/10 group-data-[theme-color=green]:bg-green-500/10 group-data-[theme-color=pink]:bg-pink-500/10 group-data-[theme-color=blue]:bg-blue-500/10 dark:bg-neutral-700">
                    <div class="container mx-auto">
                        <div class="grid grid-cols-12">
                            <div class="col-span-12 lg:col-span-10 lg:col-start-2">
                                <div class="flex flex-col bg-white rounded-lg dark:bg-neutral-800">
                                    <div class="grid flex-col grid-cols-12">
                                        <div class="col-span-12 lg:col-span-6 ltr:rounded-l-lg rtl:rounded-r-lg">
                                            <div class="p-10">
                                                <a href="/">
                                                    <img src="assets/images/logo-light.png" alt="" class="hidden mx-auto dark:block">
                                                    <img src="assets/images/logo-dark.png" alt="" class="block mx-auto dark:hidden">
                                                </a>
                                                <div class="mt-5">
                                                    <img src="assets/images/auth/reset-password.png" alt="">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-span-12 rounded-b-md lg:col-span-6 group-data-[theme-color=violet]:bg-violet-700 group-data-[theme-color=sky]:bg-sky-700 group-data-[theme-color=red]:bg-red-700 group-data-[theme-color=green]:bg-green-700 group-data-[theme-color=pink]:bg-pink-700 group-data-[theme-color=blue]:bg-blue-700 lg:rounded-b-none lg:ltr:rounded-r-lg rtl:rounded-l-lg">
                                            <div class="flex flex-col justify-center h-full p-12">
                                                <div class="text-center">
                                                    <h5 class="text-[18.5px] text-white">Réinitialiser le mot de passe</h5>
                                                    <p class="mt-3 text-white/80">Réinitialisez votre mot de passe avec InternMatch</p>
                                                </div>
                                                <div class="px-3 py-5 mt-8 mb-5 text-center text-yellow-800 rounded-md bg-yellow-50" role="alert">  Saisissez votre adresse e-mail et des instructions vous seront envoyées.  </div>
                                                <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-5">
<div class="mb-5">
  <label class="text-white">Vous êtes</label>
  <select formControlName="role"
    class="w-full mt-1 bg-violet-400/40 py-2.5 rounded border-transparent
           text-balck text-sm">
    <option value="" disabled>Choisir votre rôle</option>
    <option value="ETUDIANT">Étudiant</option>
    <option value="CANDIDAT">Candidat</option>
    <option value="ENTREPRISE">Entreprise</option>
    <option value="INSTITUTION">Institution</option>
  </select>
</div>

<!-- Email -->
<div class="mb-5">
  <label class="text-white">Email</label>
  <input type="email" formControlName="email"
    class="w-full mt-1 bg-violet-400/40 py-2.5 rounded border-transparent
          "
    placeholder="Votre adresse email">
</div>
                                                    
                                                    <div class="my-5 text-center">
                                                        <button type="submit" class="btn w-full bg-white text-gray-900 font-medium border-transparent hover:-translate-y-1.5 duration-500 ease">Envoyer la demande</button></div>
                                                </form>
                                                <div class="mt-8 text-center">
                                                    <p class="text-white/50">Vous vous en êtes souvenu ? <a href="/signin" class="text-white underline fw-medium"> Aller à la connexion </a></p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                
            </div>
        </div>
       

    
</body>
</html>
