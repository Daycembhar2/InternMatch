<div class="flex items-center lg:order-2 space-x-4 lg:space-x-6">

<ng-container *ngIf="isLoggedIn; else notLoggedIn">

  
 

  <!-- User avatar + dropdown -->
  <div class="relative" #userMenu>
   <!-- ✅ Bouton profil avec toggleMenu($event) -->
<button (click)="toggleMenu($event)"
        class="flex items-center gap-3 cursor-pointer group focus:outline-none">
    
    <!-- Photo de profil -->
    <div class="relative">
  <ng-container *ngIf="profilePic && profilePic !== 'assets/images/user/default-avatar.png'; else fallbackAvatar">
    <img [src]="profilePic"
         alt="Profil"
         class="h-9 w-9 rounded-full object-cover ring-2 ring-violet-500/50 group-hover:ring-violet-600 transition">
  </ng-container>

  <ng-template #fallbackAvatar>
    <div class="h-9 w-9 rounded-full bg-violet-500 flex items-center justify-center text-white font-bold ring-2 ring-violet-500/50">
      {{ userName?.charAt(0)?.toUpperCase() || 'U' }}
    </div>
  </ng-template>

  <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-green-500 ring-2 ring-white dark:ring-neutral-800"></span>
</div>

    <!-- Nom + rôle -->
    <div class="hidden md:block text-left">
        <div class="text-sm font-medium text-gray-800 dark:text-gray-100 leading-tight">
            {{ userName }}
        </div>
        <div class="text-xs text-gray-500 dark:text-gray-400">
            {{ userRole === 'ETUDIANT'     ? 'Étudiant'    :
               userRole === 'ENTREPRISE'  ? 'Entreprise'  :
               userRole === 'CANDIDAT'    ? 'Candidat'    :
               userRole === 'INSTITUTION' ? 'Institution' :
               userRole || 'Utilisateur' }}
        </div>
    </div>

    <!-- Chevron -->
    <i class="uil text-xl text-gray-600 dark:text-gray-400 group-hover:text-violet-600 transition"
       [ngClass]="menuOpen ? 'uil-angle-up' : 'uil-angle-down'"></i>
</button>

    <!-- Dropdown -->
    <div *ngIf="menuOpen"
         class="absolute right-0 top-full mt-3 w-56 bg-white dark:bg-neutral-800 rounded-xl shadow-2xl border border-gray-200 dark:border-neutral-700 py-2 z-50">

      <!-- User info header -->
      <div class="px-4 py-3 border-b border-gray-100 dark:border-neutral-700">
        <p class="text-sm font-semibold text-gray-800 dark:text-gray-100 truncate">{{ userName }}</p>
        <p class="text-xs text-gray-500 dark:text-gray-400 truncate">{{ userRole }}</p>
      </div>

      <!-- Profile -->
      <a (click)="goToProfile(); menuOpen = false"
         class="flex items-center px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-neutral-700 cursor-pointer">
        <i class="uil uil-user mr-3 text-lg text-violet-500"></i>
        Profil
      </a>

      <!-- Mes candidatures — étudiant & candidat uniquement -->
      <a *ngIf="userRole === 'ETUDIANT' || userRole === 'CANDIDAT'"
         routerLink="/mescandidatures"
         (click)="menuOpen = false"
         class="flex items-center px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-neutral-700">
        <i class="uil uil-clipboard-notes mr-3 text-lg text-violet-500"></i>
        Mes candidatures
      </a>

      <hr class="my-1 border-gray-200 dark:border-neutral-700">

      <!-- Sign out -->
      <button (click)="logout(); menuOpen = false"
              class="w-full flex items-center px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 text-left">
        <i class="uil uil-signout mr-3 text-lg"></i>
        Déconnexion
      </button>
    </div>
  </div>

</ng-container>

<!-- ------------------ ÉTAT NON CONNECTÉ ------------------ -->
<ng-template #notLoggedIn>
  <div class="flex items-center space-x-3 lg:space-x-4">

   

    <!-- Sign In -->
    <a routerLink="/signin"
       class="flex items-center px-3 py-2 text-sm font-medium text-gray-700 hover:text-violet-600 dark:text-gray-300 dark:hover:text-violet-400 transition">
      <i class="uil uil-signin text-xl ltr:mr-2 rtl:ml-2"></i>
      <span class="hidden sm:inline">Se connecter</span>
    </a>

    <!-- Sign Up -->
    <a routerLink="/signup"
       class="inline-flex items-center px-5 py-2.5 text-sm font-semibold text-white bg-violet-600 hover:bg-violet-700 rounded-lg transition shadow-sm">
      S’inscrire
    </a>

  </div>
</ng-template>

</div>
