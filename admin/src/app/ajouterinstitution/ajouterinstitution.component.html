<div class="wrapper">
  <app-header></app-header>
  <app-menu></app-menu>

  <div class="content-wrapper">
    <div class="container-full">

      <div class="content-header">
        <div class="d-flex align-items-center">
          <div class="me-auto">
            <h4 class="page-title">Ajouter une institution</h4>
            <div class="d-inline-block align-items-center">
              <nav>
                <ol class="breadcrumb">
                  <li class="breadcrumb-item">
                    <a href="/home"><i class="mdi mdi-home-outline"></i></a>
                  </li>
                  <li class="breadcrumb-item">
                    <a href="/listinstitution">Institutions</a>
                  </li>
                  <li class="breadcrumb-item active">Ajouter</li>
                </ol>
              </nav>
            </div>
          </div>
        </div>
      </div>

      <section class="content">
        <div class="row">
          <div class="col-12">
            <!-- CORRECTION : ajout du formGroup et ngSubmit manquants dans l'original -->
            <form [formGroup]="institutionForm" (ngSubmit)="addNewInstitution()">
              <div class="box">
                <div class="box-header with-border">
                  <h4 class="box-title">
                    <i class="fa fa-university me-10"></i>
                    Informations de l'institution
                  </h4>
                </div>
                <div class="box-body">

                  <div class="form-group row">
                    <label class="col-form-label col-md-2">
                      Nom de la faculté <span class="text-danger">*</span>
                    </label>
                    <div class="col-md-10">
                      <input
                        class="form-control"
                        type="text"
                        formControlName="nom"
                        placeholder="Nom de la faculté ou de l'institution"
                        [class.is-invalid]="nom?.invalid && nom?.touched">
                      <div class="invalid-feedback" *ngIf="nom?.invalid && nom?.touched">
                        {{ getErrorMessage(nom, 'nom') }}
                      </div>
                    </div>
                  </div>

                  <div class="form-group row">
                    <label class="col-form-label col-md-2">
                      Prénom du responsable <span class="text-danger">*</span>
                    </label>
                    <div class="col-md-10">
                      <input
                        class="form-control"
                        type="text"
                        formControlName="prenom"
                        placeholder="Prénom du responsable"
                        [class.is-invalid]="prenom?.invalid && prenom?.touched">
                      <div class="invalid-feedback" *ngIf="prenom?.invalid && prenom?.touched">
                        {{ getErrorMessage(prenom, 'prenom') }}
                      </div>
                    </div>
                  </div>

                  <div class="form-group row">
                    <label class="col-form-label col-md-2">
                      Adresse e-mail <span class="text-danger">*</span>
                    </label>
                    <div class="col-md-10">
                      <input
                        class="form-control"
                        type="email"
                        formControlName="email"
                        placeholder="institution@exemple.com"
                        [class.is-invalid]="email?.invalid && email?.touched">
                      <div class="invalid-feedback" *ngIf="email?.invalid && email?.touched">
                        {{ getErrorMessage(email, 'email') }}
                      </div>
                    </div>
                  </div>

                  <div class="form-group row">
                    <label class="col-form-label col-md-2">
                      Mot de passe <span class="text-danger">*</span>
                    </label>
                    <div class="col-md-10">
                      <input
                        class="form-control"
                        type="password"
                        formControlName="mdp"
                        placeholder="Mot de passe sécurisé"
                        [class.is-invalid]="mdp?.invalid && mdp?.touched">
                      <div class="invalid-feedback" *ngIf="mdp?.invalid && mdp?.touched">
                        {{ getErrorMessage(mdp, 'mdp') }}
                      </div>
                    </div>
                  </div>

                  <div class="form-group row">
                    <label class="col-form-label col-md-2">
                      Rôle <span class="text-danger">*</span>
                    </label>
                    <div class="col-md-10">
                      <select
                        class="form-select"
                        formControlName="role"
                        [class.is-invalid]="role?.invalid && role?.touched">
                        <option value="">-- Sélectionnez un rôle --</option>
                        <option value="superadmin">Super administrateur</option>
                        <option value="sousadmin">Sous-administrateur</option>
                      </select>
                    </div>
                  </div>

                </div>

                <div class="box-footer">
                  <div class="col-md-10 offset-md-2 d-flex gap-10">
                    <a href="/listinstitution" class="btn btn-secondary">
                      <i class="fa fa-arrow-left me-5"></i> Annuler
                    </a>
                    <button type="submit" class="btn btn-primary">
                      <i class="fa fa-save me-5"></i> Ajouter l'institution
                    </button>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </section>

    </div>
  </div>

  <app-footer></app-footer>
</div>
