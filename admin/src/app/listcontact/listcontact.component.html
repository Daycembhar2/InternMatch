<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    
    <title>Law Firm - Dashboard  Data Tables</title>
  
	<!-- Vendors Style-->
	
</head>

<body class="hold-transition dark-skin sidebar-mini theme-primary fixed">
	
<div class="wrapper">
	<div id="loader"></div>

  <app-header></app-header>
<app-menu></app-menu>

<div class="content-wrapper">
  <div class="container-full">
    <div class="content-header">
      <div class="d-flex align-items-center">
        <div class="me-auto"><h4 class="page-title">Liste des Contacts</h4></div>
      </div>
    </div>
    <section class="content">
      <div class="row">
        <div class="col-12">
          <div class="box">
            <div class="box-header"><h4 class="box-title">Contacts</h4></div>
            <div class="box-body">
              <div class="row mb-15">
                <div class="col-md-4">
                  <label>Afficher
                    <select [(ngModel)]="itemsPerPage" (change)="onItemsPerPageChange()"
                            class="form-control form-control-sm d-inline w-auto mx-5">
                      <option *ngFor="let opt of itemsPerPageOptions" [value]="opt">{{opt}}</option>
                    </select>
                    éléments
                  </label>
                </div>
                <div class="col-md-4 offset-md-4 text-end">
                  <label>Rechercher :
                    <input type="text" [(ngModel)]="searchText" (input)="onSearch()"
                           class="form-control form-control-sm d-inline w-auto ms-5"
                           placeholder="Nom, email, sujet...">
                  </label>
                </div>
              </div>
              <div class="table-responsive">
                <table class="table table-striped table-bordered" style="width:100%">
                  <thead>
                    <tr>
                      <th>Id</th><th>Nom</th><th>Email</th>
                      <th>Sujet</th><th>Commentaires</th><th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let contact of contactsPage">
                      <td>{{contact.id}}</td>
                      <td>{{contact.nom}}</td>
                      <td>{{contact.email}}</td>
                      <td>{{contact.subject}}</td>
                      <td>{{contact.comments}}</td>
                      <td>
                        <button (click)="DeleteContact(contact)" class="btn btn-danger btn-sm">
                          Supprimer
                        </button>
                      </td>
                    </tr>
                    <tr *ngIf="listeFiltered.length === 0">
                      <td colspan="6" class="text-center text-muted py-20">Aucun contact trouvé</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div class="row mt-15" *ngIf="listeFiltered.length > 0">
                <div class="col-md-5">
                  <p class="text-muted">Affichage de {{debut}} à {{fin}} sur {{listeFiltered.length}} éléments</p>
                </div>
                <div class="col-md-7">
                  <nav><ul class="pagination justify-content-end mb-0">
                    <li class="page-item" [class.disabled]="currentPage===1">
                      <a class="page-link" (click)="changerPage(currentPage-1)">Précédent</a></li>
                    <li class="page-item" *ngFor="let p of pagesArray" [class.active]="p===currentPage">
                      <a class="page-link" (click)="changerPage(p)">{{p}}</a></li>
                    <li class="page-item" [class.disabled]="currentPage===totalPages">
                      <a class="page-link" (click)="changerPage(currentPage+1)">Suivant</a></li>
                  </ul></nav>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
<app-footer></app-footer>
</div>

</body>
