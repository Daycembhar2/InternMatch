<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InternMatch - Récupération de mot de passe</title>
</head>

<body class="hold-transition theme-primary bg-img" style="background-image: url(assets/images/auth-bg/bg-2.jpg)">

  <div class="container h-p100">
    <div class="row align-items-center justify-content-md-center h-p100">
      <div class="col-12">
        <div class="row justify-content-center g-0">
          <div class="col-lg-5 col-md-5 col-12">
            <div class="bg-white rounded10 shadow-lg">
              <div class="content-top-agile p-20 pb-0">
                <h3 class="mb-0 text-primary">Récupération de mot de passe</h3>
                <p class="mt-5 text-muted">
                  Saisissez votre adresse e-mail pour recevoir un lien de réinitialisation.
                </p>
              </div>
              <div class="p-40">
                <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
                  <div class="mb-4">
                    <label for="email" class="form-label fw-bold">Adresse e-mail</label>
                    <div class="input-group">
                      <span class="input-group-text bg-transparent"><i class="ti-email"></i></span>
                      <input
                        type="email"
                        id="email"
                        class="form-control"
                        placeholder="exemple@gmail.com"
                        formControlName="email"
                        [ngClass]="{'is-invalid': emailControl?.touched && emailControl?.invalid}">
                    </div>
                    <div *ngIf="emailControl?.touched && emailControl?.invalid" class="invalid-feedback d-block">
                      <div *ngIf="emailControl?.errors?.['required']">L'adresse e-mail est requise.</div>
                      <div *ngIf="emailControl?.errors?.['email']">Format d'e-mail invalide.</div>
                    </div>
                  </div>

                  <div class="d-grid">
                    <button
                      type="submit"
                      class="btn btn-primary btn-lg"
                      [disabled]="isLoading || resetForm.invalid">
                      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"
                        role="status" aria-hidden="true"></span>
                      {{ isLoading ? 'Envoi en cours...' : 'Envoyer le lien de réinitialisation' }}
                    </button>
                  </div>

                  <div class="text-center mt-20">
                    <a href="/" class="text-primary">
                      <i class="ti-arrow-left me-5"></i> Retour à la connexion
                    </a>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
