<app-header></app-header>
<app-menu></app-menu>

<div class="content-wrapper">
  <div class="container-full">
    <div class="content-header">
      <div class="d-flex align-items-center">
        <div class="me-auto"><h4 class="page-title">Modifier l'offre</h4></div>
      </div>
    </div>

    <section class="content">
      <div class="row justify-content-center">
        <div class="col-xl-8 col-12">
          <div class="box">
            <div class="box-header">
              <h4 class="box-title">Informations de l'offre</h4>
            </div>
            <div class="box-body">
              <form [formGroup]="updateForm" (ngSubmit)="onSubmit()">

                <div class="form-group row">
                  <label class="col-form-label col-md-3">Titre <span class="text-danger">*</span></label>
                  <div class="col-md-9">
                    <input type="text" class="form-control" formControlName="titre"
                           placeholder="Titre de l'offre"
                           [class.is-invalid]="titre?.invalid && titre?.touched">
                    <div class="invalid-feedback" *ngIf="titre?.invalid && titre?.touched">
                      Titre requis (min. 3 caractères)
                    </div>
                  </div>
                </div>

                <div class="form-group row">
                  <label class="col-form-label col-md-3">Type <span class="text-danger">*</span></label>
                  <div class="col-md-9">
                    <select class="form-select" formControlName="type"
                            [class.is-invalid]="type?.invalid && type?.touched">
                      <option value="">-- Sélectionnez un type --</option>
                      <option value="stage">Stage</option>
                      <option value="emploi">Emploi</option>
                      <option value="alternance">Alternance</option>
                    </select>
                    <div class="invalid-feedback" *ngIf="type?.invalid && type?.touched">
                      Type requis
                    </div>
                  </div>
                </div>

                <div class="form-group row">
                  <label class="col-form-label col-md-3">Secteur <span class="text-danger">*</span></label>
                  <div class="col-md-9">
                    <select class="form-select" formControlName="secteur"
                            [class.is-invalid]="secteur?.invalid && secteur?.touched">
                      <option value="">-- Sélectionnez un secteur --</option>
                      <option value="IT">Technologies de l'information</option>
                      <option value="Finance">Finance</option>
                      <option value="Sante">Santé</option>
                      <option value="Education">Éducation</option>
                      <option value="Autre">Autre</option>
                    </select>
                    <div class="invalid-feedback" *ngIf="secteur?.invalid && secteur?.touched">
                      Secteur requis
                    </div>
                  </div>
                </div>

                <div class="form-group row">
                  <label class="col-form-label col-md-3">Localisation <span class="text-danger">*</span></label>
                  <div class="col-md-9">
                    <input type="text" class="form-control" formControlName="localisation"
                           placeholder="Ville, pays..."
                           [class.is-invalid]="localisation?.invalid && localisation?.touched">
                    <div class="invalid-feedback" *ngIf="localisation?.invalid && localisation?.touched">
                      Localisation requise
                    </div>
                  </div>
                </div>

                <div class="form-group row">
                  <label class="col-form-label col-md-3">Description</label>
                  <div class="col-md-9">
                    <textarea class="form-control" formControlName="description"
                              rows="4" placeholder="Description de l'offre"></textarea>
                  </div>
                </div>

                <div class="form-group row">
                  <label class="col-form-label col-md-3">Date d'expiration <span class="text-danger">*</span></label>
                  <div class="col-md-9">
                    <input type="date" class="form-control" formControlName="dateExpiration"
                           [class.is-invalid]="dateExpiration?.invalid && dateExpiration?.touched">
                    <div class="invalid-feedback" *ngIf="dateExpiration?.invalid && dateExpiration?.touched">
                      Date d'expiration requise
                    </div>
                  </div>
                </div>

                <div class="form-group row">
                  <label class="col-form-label col-md-3">Statut de validation</label>
                  <div class="col-md-9">
                    <select class="form-select" formControlName="statutValidation">
                      <option value="en attente">En attente</option>
                      <option value="validée">Validée</option>
                      <option value="rejetée">Rejetée</option>
                    </select>
                  </div>
                </div>

                <div class="form-group row mt-20">
                  <div class="col-md-9 offset-md-3 d-flex gap-10">
                    <button type="button" class="btn btn-secondary" (click)="cancel()">
                      Annuler
                    </button>
                    <button type="submit" class="btn btn-primary"
                            [disabled]="isLoading || updateForm.invalid">
                      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                      {{ isLoading ? 'Enregistrement...' : 'Enregistrer' }}
                    </button>
                  </div>
                </div>

              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<app-footer></app-footer>
